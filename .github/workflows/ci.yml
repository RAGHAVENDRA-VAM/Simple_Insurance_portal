name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: "18"

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code from repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Step 3: Cache node_modules to speed up builds
      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Step 4: Install dependencies using npm ci (clean install)
      # npm ci is preferred over npm install in CI/CD for reproducible builds
      - name: Install dependencies
        run: npm ci

      # Step 5: Run ESLint to check code quality
      - name: Run linting (ESLint)
        run: npm run lint || true  # Continue on lint errors for visibility

      # Step 6: Run unit tests
      - name: Run unit tests
        run: npm test -- --watchAll=false --coverage

      # Step 7: Build the React application
      - name: Build application
        run: npm run build

      # Step 8: Upload build artifact for deployment stage
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 1

  code-quality:
    name: Code Quality & Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      # Step 1: Checkout code for analysis
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Initialize CodeQL for JavaScript analysis
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: javascript

      # Step 3: Autobuild JavaScript code (if needed)
      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      # Step 4: Run CodeQL analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

      # Step 5: Upload SARIF results (optional, for GitHub Security tab)
      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: output/sarif.json
