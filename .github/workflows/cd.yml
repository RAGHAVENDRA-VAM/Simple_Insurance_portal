name: CD Pipeline - Deploy to Azure

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: "insurance-portal-prod-app"

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    # Only deploy if CI pipeline succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: production
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Download build artifact from CI pipeline
      - name: Download build artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: ci.yml
          name: build
          path: build/

      # Step 3: Deploy to Azure Web App using publish profile
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./build

      # Step 4: Log deployment status
      - name: Log deployment success
        run: |
          echo "✅ Successfully deployed to Azure Web App"
          echo "App URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"

  notification:
    name: Send Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      # Step 1: Determine deployment status
      - name: Check deployment status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "DEPLOYMENT_STATUS=✅ SUCCESS" >> $GITHUB_ENV
          else
            echo "DEPLOYMENT_STATUS=❌ FAILED" >> $GITHUB_ENV
          fi

      # Step 2: Output notification (can be extended with Slack/Email)
      - name: Display notification
        run: echo "Deployment Status: ${{ env.DEPLOYMENT_STATUS }}"
